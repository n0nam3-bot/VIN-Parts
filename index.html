<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIN to Parts Decoder</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            text-transform: uppercase;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .vehicle-info {
            display: none; /* Hidden by default */
        }

        .vehicle-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .vehicle-subtitle {
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .parts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .part-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-weight: 500;
            transition: transform 0.2s, background 0.2s;
            text-align: center;
        }

        .part-btn:hover {
            background: #e2e8f0;
            transform: translateY(-2px);
        }

        .error {
            color: #dc2626;
            margin-top: 10px;
            display: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VIN Parts Finder</h1>
        <p>Enter a VIN to find compatible parts instantly.</p>
    </div>

    <div class="card">
        <div class="input-group">
            <input type="text" id="vinInput" placeholder="Enter VIN (e.g., 1HGCM...)" maxlength="17">
            <button onclick="decodeVin()" id="searchBtn">Decode</button>
        </div>
        <div id="loader" class="loader">Decoding VIN...</div>
        <div id="errorMsg" class="error"></div>
    </div>

    <!-- Results Section -->
    <div id="results" class="card vehicle-info">
        <div class="vehicle-title" id="vehicleName"></div>
        <div class="vehicle-subtitle" id="vehicleDetails"></div>

        <h3>Shop Specific Parts</h3>
        <div class="parts-grid" id="partsLinks">
            <!-- Links generated by JS -->
        </div>
    </div>
</div>

<script>
    async function decodeVin() {
        const vin = document.getElementById('vinInput').value.trim();
        const errorMsg = document.getElementById('errorMsg');
        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        const btn = document.getElementById('searchBtn');

        // Reset UI
        errorMsg.style.display = 'none';
        results.style.display = 'none';
        
        if (vin.length !== 17) {
            errorMsg.textContent = "Please enter a valid 17-character VIN.";
            errorMsg.style.display = 'block';
            return;
        }

        btn.disabled = true;
        loader.style.display = 'block';

        try {
            // Fetch from NHTSA API
            const response = await fetch(`https://dot.gov{vin}?format=json`);
            const data = await response.json();

            // Extract core fields
            const getVal = (id) => data.Results.find(r => r.Variable === id)?.Value;
            
            const year = getVal('Model Year');
            const make = getVal('Make');
            const model = getVal('Model');
            const engine = getVal('Displacement (L)'); // Optional extra detail
            const fuel = getVal('Fuel Type - Primary');

            if (!year || !make || !model) {
                throw new Error("Could not decode vehicle details from this VIN.");
            }

            // Display Vehicle Info
            document.getElementById('vehicleName').textContent = `${year} ${make} ${model}`;
            document.getElementById('vehicleDetails').textContent = `VIN: ${vin} | Engine: ${engine || 'N/A'}L | Fuel: ${fuel || 'N/A'}`;

            // Generate Part Links
            generatePartLinks(year, make, model);
            
            results.style.display = 'block';

        } catch (err) {
            errorMsg.textContent = "Error: " + err.message;
            errorMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function generatePartLinks(year, make, model) {
        const container = document.getElementById('partsLinks');
        container.innerHTML = '';

        // Search Query Base
        const carQuery = `${year} ${make} ${model}`;

        // List of parts categories to generate
        const parts = [
            { name: "Brake Pads", query: "brake pads" },
            { name: "Brake Rotors", query: "brake rotors" },
            { name: "Oil Filter", query: "oil filter" },
            { name: "Air Filter", query: "air filter" },
            { name: "Spark Plugs", query: "spark plugs" },
            { name: "Battery", query: "battery" },
            { name: "Alternator", query: "alternator" },
            { name: "Serpentine Belt", query: "serpentine belt" },
            { name: "Water Pump", query: "water pump" },
            { name: "Radiator", query: "radiator" },
            { name: "Headlight Bulb", query: "headlight bulb" },
            { name: "Wiper Blades", query: "wiper blades" }
        ];

        parts.forEach(part => {
            const link = document.createElement('a');
            link.className = 'part-btn';
            link.target = '_blank';
            
            // RockAuto Link Construction (Search based)
            // RockAuto is tricky to deep link without IDs, so we use Google Shopping or AutoZone for reliability.
            // Using AutoZone Search for this example as it handles keywords well:
            const searchUrl = `https://autozone.com{encodeURIComponent(carQuery + " " + part.query)}`;
            
            // Alternative: Amazon Search
            // const searchUrl = `https://amazon.com{encodeURIComponent(carQuery + " " + part.query)}`;

            link.href = searchUrl;
            link.innerHTML = `<span>${part.name}</span>`;
            container.appendChild(link);
        });
        
        // Add a "View All Parts" button for RockAuto Catalog
        const raLink = document.createElement('a');
        raLink.className = 'part-btn';
        raLink.style.background = '#e0f2fe';
        raLink.style.color = '#0369a1';
        raLink.target = '_blank';
        raLink.href = `https://rockauto.com`; // Directs to catalog root as deep linking requires internal IDs
        raLink.innerHTML = `<span>📂 Full Catalog (RockAuto)</span>`;
        container.appendChild(raLink);
    }
</script>

</body>
</html>
